<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad-logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E9B4E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B7A3A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-drop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288D1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E9B4E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 图标：水滴 + 柠檬叶 + 盾牌 -->

  <!-- 盾牌底形 -->
  <path d="M15,20 L15,55 C15,80 45,98 70,105 L70,105 C95,98 125,80 125,55 L125,20 L70,10 Z"
        fill="url(#grad-logo)" opacity="0.08"/>

  <!-- 柠檬叶片（左） -->
  <path d="M45,45 Q55,28 70,35 Q60,42 55,50 Z"
        fill="url(#grad-leaf)" opacity="0.9"/>

  <!-- 柠檬叶片（右） -->
  <path d="M75,48 Q88,30 100,38 Q90,48 82,55 Z"
        fill="url(#grad-leaf)" opacity="0.7"/>

  <!-- 水滴主体 -->
  <path d="M68,30 Q70,28 72,30 Q78,40 78,50 Q78,60 70,60 Q62,60 62,50 Q62,40 68,30 Z"
        fill="url(#grad-drop)" opacity="0.85"/>

  <!-- 水滴高光 -->
  <ellipse cx="67" cy="45" rx="3" ry="5" fill="white" opacity="0.4"/>

  <!-- 小气泡 -->
  <circle cx="90" cy="65" r="4" fill="#4FC3F7" opacity="0.3"/>
  <circle cx="96" cy="58" r="2.5" fill="#4FC3F7" opacity="0.2"/>
  <circle cx="55" cy="68" r="3" fill="#4FC3F7" opacity="0.25"/>

  <!-- 文字：睿钰昇 -->
  <text x="145" y="48" font-family="'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif"
        font-size="36" font-weight="700" fill="#1B5E20" letter-spacing="4">
    睿钰昇
  </text>

  <!-- 文字：日用科技 -->
  <text x="156" y="74" font-family="'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif"
        font-size="14" font-weight="400" fill="#558B2F" letter-spacing="6">
    日 用 科 技
  </text>

  <!-- 分割线 -->
  <line x1="148" y1="82" x2="340" y2="82" stroke="#A5D6A7" stroke-width="1" opacity="0.6"/>

  <!-- 标语 -->
  <text x="148" y="100" font-family="'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif"
        font-size="11" fill="#81C784" letter-spacing="2">
    食品级 · 安心净 · 家清优选
  </text>

</svg>
