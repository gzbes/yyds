        fill="url(#g-drop)" opacity="0.85"/>
  <!-- 高光 -->
  <ellipse cx="30" cy="32" rx="2.5" ry="4" fill="white" opacity="0.45"/>

  <!-- 气泡 -->
  <circle cx="44" cy="42" r="3" fill="#4FC3F7" opacity="0.25"/>
  <circle cx="47" cy="37" r="1.8" fill="#4FC3F7" opacity="0.15"/>
  <circle cx="20" cy="44" r="2" fill="#4FC3F7" opacity="0.2"/>
