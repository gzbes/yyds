  <!-- 叶左 -->
  <path d="M22,28 Q28,16 36,22 Q30,26 27,32Z" fill="url(#g-leaf)" opacity="0.9"/>
  <!-- 叶右 -->
  <path d="M37,24 Q46,18 50,26 Q42,30 38,34Z" fill="url(#g-leaf)" opacity="0.7"/>

  <!-- 水滴 -->
